name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run tests
        run: uv run pytest

  build:
    name: Build binary (${{ matrix.os }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: meshprov-linux-x64
            bin: dist/meshprov
          - os: macos-latest
            asset: meshprov-macos-arm64
            bin: dist/meshprov
          - os: windows-latest
            asset: meshprov-windows-x64.exe
            bin: dist/meshprov.exe
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Build standalone binary
        working-directory: packaging
        run: uv run pyinstaller meshprov.spec --noconfirm --distpath ../dist --workpath ../build

      - name: Smoke-test the binary
        shell: bash
        run: |
          "${{ matrix.bin }}" --help
          "${{ matrix.bin }}" fam --help

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.bin }}
          if-no-files-found: error
